name: finet-crm-railway

services:
  backend:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    env_file:
      - .env.railway
    environment:
      PORT: 3000
      FRONTEND_URL: http://localhost:${RAILWAY_FRONTEND_PORT:-5174}
    ports:
      - "${RAILWAY_BACKEND_PORT:-3001}:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - railway_backend_node_modules:/app/node_modules
    command: sh -c "npm install && npx prisma generate && npm run db:compatibility && npm run start:dev"

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    env_file:
      - .env.railway
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      API_PROXY_TARGET: http://backend:3000
    ports:
      - "${RAILWAY_FRONTEND_PORT:-5174}:5173"
    volumes:
      - ./frontend:/app
      - railway_frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  railway_backend_node_modules:
  railway_frontend_node_modules:
